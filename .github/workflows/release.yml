name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release + upload assets
  packages: write   # push to GHCR

jobs:
  # ── Verify tag matches code version ─────────────────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches code version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          go_ver=$(grep 'const version = ' cmd/gtkai/main.go | sed 's/.*"\([0-9.]*\)".*/\1/')
          if [ -z "$go_ver" ]; then
            echo "could not extract version from cmd/gtkai/main.go"
            exit 1
          fi
          if [ "$tag" != "$go_ver" ]; then
            echo "tag '$tag' does not match cmd/gtkai/main.go version '$go_ver'"
            exit 1
          fi
          echo "tag matches code version: $go_ver"

      - name: Verify version consistency across files
        run: |
          go_ver=$(grep 'const version = ' cmd/gtkai/main.go | sed 's/.*"\([0-9.]*\)".*/\1/')
          failed=0
          check() {
            local label=$1 val=$2
            if [ "$val" != "$go_ver" ]; then
              echo "version drift: $label = '$val', expected '$go_ver'"
              failed=1
            else
              echo "ok: $label = $val"
            fi
          }
          check ".claude-plugin/marketplace.json"   "$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)"
          check ".claude-plugin/plugin.json"        "$(jq -r '.version' .claude-plugin/plugin.json)"
          check "plugin/.claude-plugin/plugin.json" "$(jq -r '.version' plugin/.claude-plugin/plugin.json)"
          check "modules/mcpscan/mcpscan.go"        "$(sed -n 's/.*"version": "\([0-9.]*\)".*/\1/p' modules/mcpscan/mcpscan.go | head -1)"
          exit $failed

  # ── Build binaries + create GitHub Release ──────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries (all platforms)
        run: |
          mkdir -p dist

          # Names must match install.sh URL pattern: gtkai-{os}-{arch}
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/gtkai-linux-amd64   ./cmd/gtkai/
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/gtkai-linux-arm64   ./cmd/gtkai/
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/gtkai-darwin-amd64  ./cmd/gtkai/
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/gtkai-darwin-arm64  ./cmd/gtkai/
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/gtkai-windows-amd64.exe ./cmd/gtkai/

          echo "Built:"
          ls -lh dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          for f in gtkai-linux-amd64 gtkai-linux-arm64 gtkai-darwin-amd64 gtkai-darwin-arm64 gtkai-windows-amd64.exe; do
            [ -f "$f" ] && shasum -a 256 "$f" > "${f}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── Build Docker image + push to GHCR ───────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [version-check, release]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
